apiVersion: v1
kind: Service
metadata:
  name: helpdesk-api
  namespace: helpdesk
spec:
  selector:
    app: helpdesk-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: helpdesk-api
  namespace: helpdesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: helpdesk-api
  template:
    metadata:
      labels:
        app: helpdesk-api
        app.kubernetes.io/part-of: helpdesk
    spec:
      initContainers:
        - name: wait-for-infrastructure
          image: busybox:1.36
          command:
            - sh
            - -c
            - >-
              until nc -z postgres 5432; do echo "Waiting for PostgreSQL"; sleep 3; done;
              until nc -z kafka 9092; do echo "Waiting for Kafka"; sleep 3; done
      containers:
        - name: api
          image: helpdesk-backend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: helpdesk-config
            - secretRef:
                name: helpdesk-secrets
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
