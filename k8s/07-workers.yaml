apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: helpdesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        app.kubernetes.io/part-of: helpdesk
    spec:
      initContainers:
        - name: wait-for-infrastructure
          image: busybox:1.36
          command:
            - sh
            - -c
            - >-
              until nc -z postgres 5432; do echo "Waiting for PostgreSQL"; sleep 3; done;
              until nc -z kafka 9092; do echo "Waiting for Kafka"; sleep 3; done
      containers:
        - name: notification-service
          image: helpdesk-notification-service:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: helpdesk-config
            - secretRef:
                name: helpdesk-secrets
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 300m
              memory: 384Mi
---
